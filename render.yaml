services:
  # Backend: FastAPI License Server
  - type: web
    name: ghostshell-license-server
    env: python
    plan: free
    region: oregon
    rootDir: backend        # backend code lives here
    pythonVersion: 3.11.9     
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://ghost_shell_db_user:6x0kEr92lIGtn0iduiyXKXtSxuGizH4h@dpg-d5g10o8gjchc73b1c4s0-a.oregon-postgres.render.com/ghost_shell_db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: UNIVERSAL_LICENSE_KEY
        value: GHOST-SHELL-UNIVERSAL-2026

  # Frontend: Streamlit Admin Panel
  - type: web
    name: black-pessah-admin
    env: python
    plan: free
    region: oregon
    rootDir: frontend      # frontend code lives here
    pythonVersion: 3.13   # Free tier only supports 3.13
    buildCommand: pip install --upgrade pip && pip install -r requirements-frontend.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
