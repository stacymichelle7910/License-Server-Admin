services:
  # Backend: FastAPI License Server
  - type: web
    name: license_server_db
    env: python
    plan: free
    pythonVersion: 3.12
    buildCommand: |
      pip install --upgrade pip
      pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: postgresql://ghost_shell_db_user:6x0kEr92lIGtn0iduiyXKXtSxuGizH4h@dpg-d5g10o8gjchc73b1c4s0-a.oregon-postgres.render.com/ghost_shell_db
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_TOKEN
        generateValue: true
      - key: UNIVERSAL_LICENSE_KEY
        value: GHOST-SHELL-UNIVERSAL-2026

  # Frontend: Streamlit App
  - type: web
    name: server-admin
    env: python
    plan: free
    pythonVersion: 3.12
    buildCommand: |
      pip install --upgrade pip
      pip install -r frontend/requirements-frontend.txt
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0

databases:
  - name: license_server_db
    databaseName: ghost_shell_db
    user: ghost_shell_db_user
